<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GemmaSight — Clinical Triage</title>
    <style>
        :root {
            --bg-primary: #ede8df;
            --bg-secondary: #f7f4ef;
            --bg-tertiary: #f0ece4;
            --bg-elevated: #e6e0d5;
            --text-primary: #2c2824;
            --text-secondary: #5a534a;
            --text-muted: #8a8276;
            --border-subtle: #ddd6c8;
            --border-strong: #c8bfb0;
            --red: #c23b3b;
            --red-dim: #f5e0e0;
            --red-glow: rgba(194, 59, 59, 0.10);
            --yellow: #b8860b;
            --yellow-dim: #f5ecd0;
            --yellow-glow: rgba(184, 134, 11, 0.10);
            --green: #3d7a5e;
            --green-dim: #e0f0e6;
            --green-glow: rgba(61, 122, 94, 0.10);
            --blue: #4a6fa5;
            --blue-glow: rgba(74, 111, 165, 0.10);
            --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Source Code Pro', Consolas, 'Courier New', monospace;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-display);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(247, 244, 239, 0.88);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--blue), #1d3557);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 14px;
            color: white;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--blue);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            color: var(--green);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Main Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 900px) {
            .grid { grid-template-columns: 400px 1fr; }
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .card-body {
            padding: 24px;
        }

        /* Capture Button */
        .capture-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 40px 24px;
            background: var(--bg-tertiary);
            border: 2px dashed var(--border-strong);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-family: var(--font-display);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .capture-btn:hover {
            border-color: var(--blue);
            background: var(--blue-glow);
            color: var(--text-primary);
        }

        .capture-btn:active {
            transform: scale(0.98);
        }

        .capture-icon {
            width: 64px;
            height: 64px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .capture-btn:hover .capture-icon {
            background: var(--blue);
            border-color: var(--blue);
            color: white;
        }

        .capture-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .capture-hint {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Scanner Frame Overlay */
        .scanner-frame {
            position: absolute;
            inset: 8px;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .capture-btn:hover .scanner-frame {
            border-color: var(--blue);
        }
        .scanner-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--border-strong);
            border-style: solid;
            transition: all 0.3s ease;
        }
        .capture-btn:hover .scanner-corner {
            border-color: var(--blue);
        }
        .scanner-corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .scanner-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
        .scanner-corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
        .scanner-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        /* Form Hint */
        .form-hint {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 16px;
            padding: 12px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-secondary);
        }
        .form-hint svg {
            flex-shrink: 0;
            margin-top: 2px;
            color: var(--text-muted);
        }
        .form-hint strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* New Patient Badge */
        .new-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: var(--blue);
            color: white;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Field status indicators */
        .data-value.missing {
            color: var(--text-muted);
            font-style: italic;
        }
        .data-value.extracted {
            color: var(--text-primary);
        }
        .field-status {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .field-status.ok { background: var(--green); }
        .field-status.miss { background: var(--text-muted); opacity: 0.4; }

        .capture-input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Triage Card */
        .triage-banner {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .triage-banner::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .triage-banner.red {
            background: var(--red-glow);
        }
        .triage-banner.red::before { background: var(--red); }

        .triage-banner.yellow {
            background: var(--yellow-glow);
        }
        .triage-banner.yellow::before { background: var(--yellow); }

        .triage-banner.green {
            background: var(--green-glow);
        }
        .triage-banner.green::before { background: var(--green); }

        .triage-indicator {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .triage-indicator.red {
            background: var(--red);
            color: white;
            box-shadow: 0 0 20px var(--red-glow), 0 0 40px var(--red-glow);
        }

        .triage-indicator.yellow {
            background: var(--yellow);
            color: #ffffff;
        }

        .triage-indicator.green {
            background: var(--green);
            color: white;
        }

        .triage-info h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .triage-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .triage-meta {
            margin-left: auto;
            text-align: right;
            flex-shrink: 0;
        }

        .triage-wait {
            font-family: var(--font-mono);
            font-size: 20px;
            font-weight: 700;
        }

        .triage-wait-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        /* Data Grid */
        .data-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1px;
            background: var(--border-subtle);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        @media (min-width: 500px) {
            .data-grid { grid-template-columns: 1fr 1fr; }
        }

        .data-cell {
            background: var(--bg-secondary);
            padding: 16px 20px;
        }

        .data-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .data-value {
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            word-break: break-word;
        }

        .data-value.unreadable {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Patient List */
        .patient-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border-subtle);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .patient-item {
            background: var(--bg-secondary);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .patient-item:hover {
            background: var(--bg-tertiary);
        }

        .patient-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
        }

        .patient-item.red::before { background: var(--red); }
        .patient-item.yellow::before { background: var(--yellow); }
        .patient-item.green::before { background: var(--green); }

        .patient-priority {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 10px;
            flex-shrink: 0;
        }

        .patient-priority.red {
            background: var(--red-dim);
            color: #991b1b;
        }

        .patient-priority.yellow {
            background: var(--yellow-dim);
            color: #92400e;
        }

        .patient-priority.green {
            background: var(--green-dim);
            color: #065f46;
        }

        .patient-info {
            flex: 1;
            min-width: 0;
        }

        .patient-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .patient-details {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .patient-time {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* Loading */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 48px 24px;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .progress-track {
            width: 180px;
            height: 4px;
            background: var(--border-subtle);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), #6b9bd1);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--blue), transparent);
            opacity: 0.6;
            animation: scanMove 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes scanMove {
            0% { top: 0; opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { top: 100%; opacity: 0; }
        }

        /* Priority badges — more distinctive */
        .patient-priority {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 10px;
            flex-shrink: 0;
            box-shadow: inset 0 0 0 2px currentColor;
        }

        .patient-priority.red {
            background: var(--red);
            color: #ffffff;
            box-shadow: 0 0 0 3px var(--red-glow), inset 0 0 0 2px rgba(255,255,255,0.3);
        }

        .patient-priority.yellow {
            background: var(--yellow);
            color: #ffffff;
            box-shadow: 0 0 0 3px var(--yellow-glow), inset 0 0 0 2px rgba(255,255,255,0.3);
        }

        .patient-priority.green {
            background: var(--green);
            color: #ffffff;
            box-shadow: 0 0 0 3px var(--green-glow), inset 0 0 0 2px rgba(255,255,255,0.3);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 56px 24px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state-icon svg {
            width: 24px;
            height: 24px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 14px;
            font-weight: 500;
        }

        /* Section */
        .section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding-left: 4px;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 4px;
        }

        .filter-tab {
            flex: 1;
            padding: 8px 12px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .filter-tab:hover {
            color: var(--text-primary);
        }

        .filter-tab.active {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .filter-tab .tab-count {
            font-family: var(--font-mono);
            font-size: 11px;
            margin-left: 4px;
            opacity: 0.7;
        }

        /* Print Button */
        .print-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 16px;
        }

        .print-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-color: var(--border-strong);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(44, 40, 36, 0.5);
            backdrop-filter: blur(12px);
            z-index: 500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        @media (min-width: 600px) {
            .modal-overlay {
                align-items: center;
            }
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            width: 100%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
        }

        @media (min-width: 600px) {
            .modal {
                border-radius: var(--radius-lg);
                transform: translateY(40px) scale(0.95);
                max-height: 90vh;
                box-shadow: 0 24px 80px rgba(0,0,0,0.15), 0 0 0 1px var(--border-subtle);
            }
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-section {
            margin-bottom: 24px;
        }

        .modal-section:last-child {
            margin-bottom: 0;
        }

        .modal-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .rules-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .rule-tag {
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .escalation-box {
            padding: 12px 16px;
            background: var(--yellow-glow);
            border: 1px solid var(--yellow-dim);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .escalation-box svg {
            width: 18px;
            height: 18px;
            color: var(--yellow);
            flex-shrink: 0;
        }

        .escalation-text {
            font-size: 13px;
            color: var(--yellow);
            font-weight: 500;
        }

        /* Print Styles */
        @media print {
            body::after { display: none; }
            .header, .filter-tabs, .upload-zone, .camera-btn, .print-btn, .patient-list, .modal-overlay, .toast { display: none !important; }
            .container { padding: 0; max-width: 100%; }
            .grid { grid-template-columns: 1fr; gap: 0; }
            .section { margin-bottom: 0; }
            .card { border: 1px solid #ccc; box-shadow: none; }
            .triage-banner { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        }

        /* Preview image */
        .preview-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 24px;
            background: var(--text-primary);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            color: var(--bg-secondary);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            border-color: var(--red);
            background: var(--bg-secondary);
            color: var(--red);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes flashHighlight {
            0% { background: var(--blue-glow); }
            100% { background: var(--bg-secondary); }
        }

        .animate-in {
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .patient-item.is-new {
            animation: flashHighlight 1.5s ease-out forwards;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 3px;
        }

        /* Subtle dot pattern overlay for texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.025;
            background-image: radial-gradient(circle, var(--text-primary) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-text">Gemma<span>Sight</span></div>
        </div>
        <div class="status-badge" id="clockBadge">
            <span id="liveClock">--:--</span>
        </div>
    </header>

    <main class="container">
        <div class="grid">
            <!-- Left Column: Upload + Results -->
            <div>
                <!-- Upload Section -->
                <section class="section">
                    <h2 class="section-title">Patient Intake</h2>
                    <div class="card">
                        <div class="card-body">
                            <button class="capture-btn" id="captureBtn">
                                <input type="file" class="capture-input" id="captureInput" accept="image/*">
                                <div class="scanner-frame">
                                    <div class="scanner-corner tl"></div>
                                    <div class="scanner-corner tr"></div>
                                    <div class="scanner-corner bl"></div>
                                    <div class="scanner-corner br"></div>
                                </div>
                                <div class="capture-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
                                    </svg>
                                </div>
                                <div class="capture-text">Photograph Intake Form</div>
                                <div class="capture-hint">Tap to use camera or browse</div>
                            </button>
                            <div class="form-hint">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zM8.25 9.75h.008v.008H8.25V9.75zm0 3h.008v.008H8.25V12.75z" />
                                </svg>
                                <span>
                                    <strong>Required for triage:</strong> Age, Chief Complaint<br>
                                    <span style="opacity: 0.8;">Optional:</span> Name, Gender, Duration, Allergies, Medications, Referred By
                                </span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Results Section -->
                <section class="section hidden" id="resultsSection">
                    <h2 class="section-title">Extraction Results</h2>
                    <div class="card animate-in">
                        <div class="triage-banner" id="triageBanner">
                            <div class="triage-indicator" id="triageIndicator">RED</div>
                            <div class="triage-info">
                                <h3 id="triageTitle">Emergency</h3>
                                <p id="triageAction">Immediate physician review</p>
                            </div>
                            <div class="triage-meta">
                                <div class="triage-wait" id="triageWait">&lt; 1 min</div>
                                <div class="triage-wait-label">Wait Time</div>
                            </div>
                        </div>
                        <div class="card-body">
                            <img class="preview-image hidden" id="previewImage" alt="Uploaded form">
                            <div class="data-grid" id="dataGrid">
                                <!-- Populated by JS -->
                            </div>
                            <button class="print-btn" id="printBtn" onclick="printTriageCard()">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0110.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0l.229 2.523a1.125 1.125 0 01-1.12 1.227H7.231c-.662 0-1.18-.568-1.12-1.227L6.34 18m11.318 0h1.091A2.25 2.25 0 0021 15.75V9.456c0-1.081-.768-2.015-1.837-2.175a48.055 48.055 0 00-1.913-.247M6.34 18H5.25A2.25 2.25 0 013 15.75V9.456c0-1.081.768-2.015 1.837-2.175a48.041 48.041 0 011.913-.247m10.5 0a48.536 48.536 0 00-10.5 0m10.5 0V3.375c0-.621-.504-1.125-1.125-1.125h-8.25c-.621 0-1.125.504-1.125 1.125v3.659M18 10.5h.008v.008H18V10.5z" />
                                </svg>
                                Print Triage Card
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Loading -->
                <div class="loading" id="loading">
                    <div style="position: relative;">
                        <div class="spinner"></div>
                        <div class="scan-line"></div>
                    </div>
                    <div class="loading-text">Analyzing form...</div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div style="font-size: 11px; color: var(--text-muted); font-family: var(--font-mono);" id="progressPercent">0%</div>
                </div>
            </div>

            <!-- Right Column: Patient Queue -->
            <div>
                <section class="section">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                        <h2 class="section-title" style="margin: 0;">Triage Queue</h2>
                        <span style="font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);" id="queueCount">3 patients</span>
                    </div>
                    <div class="filter-tabs" id="filterTabs">
                        <button class="filter-tab active" data-filter="all">All<span class="tab-count" id="countAll">3</span></button>
                        <button class="filter-tab" data-filter="red">Red<span class="tab-count" id="countRed">1</span></button>
                        <button class="filter-tab" data-filter="yellow">Yellow<span class="tab-count" id="countYellow">1</span></button>
                        <button class="filter-tab" data-filter="green">Green<span class="tab-count" id="countGreen">1</span></button>
                    </div>
                    <div class="patient-list" id="patientList">
                        <!-- Populated by JS -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Patient Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Patient Details</div>
                <button class="modal-close" id="modalClose">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Mock data - simulating backend responses
        const MOCK_PATIENTS = [
            {
                id: 3,
                patient_name: "Ravi Shankar",
                age: "67",
                gender: "Male",
                chief_complaint: "Chest pain radiating to left arm",
                duration: "15 minutes",
                allergies: "None known",
                medications: "Aspirin",
                referred_by: "Ambulance",
                priority: "red",
                priority_label: "Emergency",
                wait_time: "< 1 min",
                action: "Immediate physician review",
                matched_rules: ["R01", "R02"],
                matched_descriptions: ["R01: Chest pain — possible cardiac emergency", "R02: Difficulty breathing — respiratory distress"],
                escalated: 1,
                escalation_reason: "Age escalation (age 67 > 65)",
                created_at: "2026-04-27 09:15:32"
            },
            {
                id: 2,
                patient_name: "Lakshmi Devi",
                age: "34",
                gender: "Female",
                chief_complaint: "High fever and severe headache",
                duration: "2 days",
                allergies: "Sulfa drugs",
                medications: "Paracetamol",
                referred_by: "ASHA worker",
                priority: "yellow",
                priority_label: "Priority",
                wait_time: "< 30 min",
                action: "Rapid assessment",
                matched_rules: ["R08"],
                matched_descriptions: ["R08: High fever with altered consciousness — possible sepsis/meningitis"],
                escalated: 0,
                escalation_reason: "",
                created_at: "2026-04-27 08:42:18"
            },
            {
                id: 1,
                patient_name: "Maya Raman",
                age: "43",
                gender: "Female",
                chief_complaint: "Fever and chills",
                duration: "3 days",
                allergies: "Penicillin",
                medications: "Metformin",
                referred_by: "ASHA worker",
                priority: "green",
                priority_label: "Non-urgent",
                wait_time: "< 120 min",
                action: "Queue — stable",
                matched_rules: [],
                matched_descriptions: [],
                escalated: 0,
                escalation_reason: "",
                created_at: "2026-04-27 07:30:05"
            }
        ];

        const MOCK_EXTRACTION_RESPONSE = {
            patient_id: 4,
            extracted: {
                patient_name: "Suresh Patel",
                age: "58",
                gender: "Male",
                chief_complaint: "Difficulty breathing",
                duration: "45 minutes",
                allergies: "None known",
                medications: "Amlodipine",
                referred_by: "Self"
            },
            triage: {
                priority: "red",
                priority_label: "Emergency",
                wait_time: "< 1 min",
                action: "Immediate physician review",
                matched_rules: ["R02"],
                matched_descriptions: ["R02: Difficulty breathing — respiratory distress"],
                escalated: 0,
                escalation_reason: "",
                input: {}
            },
            timestamp: "2026-04-27 10:05:12"
        };

        // DOM elements
        const captureBtn = document.getElementById('captureBtn');
        const captureInput = document.getElementById('captureInput');
        const resultsSection = document.getElementById('resultsSection');
        const loading = document.getElementById('loading');
        const dataGrid = document.getElementById('dataGrid');
        const patientList = document.getElementById('patientList');
        const previewImage = document.getElementById('previewImage');
        const toast = document.getElementById('toast');
        const queueCount = document.getElementById('queueCount');
        const filterTabs = document.getElementById('filterTabs');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        const liveClock = document.getElementById('liveClock');

        // Triage banner elements
        const triageBanner = document.getElementById('triageBanner');
        const triageIndicator = document.getElementById('triageIndicator');
        const triageTitle = document.getElementById('triageTitle');
        const triageAction = document.getElementById('triageAction');
        const triageWait = document.getElementById('triageWait');

        let currentFilter = 'all';

        // Initialize
        function init() {
            renderPatientList();
            setupEventListeners();
            updateFilterCounts();
            updateClock();
            setInterval(updateClock, 1000);
        }

        function updateClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            liveClock.textContent = `${hours}:${minutes}`;
        }

        function setupEventListeners() {
            captureBtn.addEventListener('dragover', (e) => {
                e.preventDefault();
                captureBtn.style.borderColor = 'var(--blue)';
                captureBtn.style.background = 'var(--blue-glow)';
            });
            captureBtn.addEventListener('dragleave', () => {
                captureBtn.style.borderColor = '';
                captureBtn.style.background = '';
            });
            captureBtn.addEventListener('drop', (e) => {
                e.preventDefault();
                captureBtn.style.borderColor = '';
                captureBtn.style.background = '';
                const files = e.dataTransfer.files;
                if (files.length > 0) handleFile(files[0]);
            });
            captureInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) handleFile(e.target.files[0]);
            });

            // Filter tabs
            filterTabs.addEventListener('click', (e) => {
                const tab = e.target.closest('.filter-tab');
                if (!tab) return;
                currentFilter = tab.dataset.filter;
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderPatientList();
            });

            // Modal close
            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });

            // Patient item clicks (event delegation)
            patientList.addEventListener('click', (e) => {
                const item = e.target.closest('.patient-item');
                if (!item) return;
                const patientId = parseInt(item.dataset.id);
                const patient = MOCK_PATIENTS.find(p => p.id === patientId);
                if (patient) openModal(patient);
            });
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('Please upload an image file', 'error');
                return;
            }

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.classList.remove('hidden');
            };
            reader.readAsDataURL(file);

            // Simulate upload
            resultsSection.classList.add('hidden');
            loading.classList.add('active');

            // Mock API delay with progress
            const progressFill = document.getElementById('progressFill');
            const progressPercent = document.getElementById('progressPercent');
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
                progressPercent.textContent = Math.round(progress) + '%';
            }, 250);

            setTimeout(() => {
                clearInterval(progressInterval);
                progressFill.style.width = '100%';
                progressPercent.textContent = '100%';
                setTimeout(() => {
                    loading.classList.remove('active');
                    progressFill.style.width = '0%';
                    progressPercent.textContent = '0%';
                    showResults(MOCK_EXTRACTION_RESPONSE);
                    
                    // Add to queue
                    const newPatient = {
                        id: MOCK_EXTRACTION_RESPONSE.patient_id,
                        ...MOCK_EXTRACTION_RESPONSE.extracted,
                        ...MOCK_EXTRACTION_RESPONSE.triage,
                        created_at: MOCK_EXTRACTION_RESPONSE.timestamp,
                        isNew: true
                    };
                    MOCK_PATIENTS.forEach(p => delete p.isNew);
                    MOCK_PATIENTS.unshift(newPatient);
                    renderPatientList();
                    updateFilterCounts();
                    
                    showToast('Patient analyzed and added to queue');
                }, 300);
            }, 2000);
        }

        function showResults(data) {
            resultsSection.classList.remove('hidden');
            
            const triage = data.triage;
            const extracted = data.extracted;
            
            // Update triage banner
            triageBanner.className = `triage-banner ${triage.priority}`;
            triageIndicator.className = `triage-indicator ${triage.priority}`;
            triageIndicator.textContent = triage.priority.toUpperCase();
            triageTitle.textContent = triage.priority_label;
            triageAction.textContent = triage.action;
            triageWait.textContent = triage.wait_time;
            
            // Update data grid
            const fields = [
                { key: 'patient_name', label: 'Patient Name' },
                { key: 'age', label: 'Age' },
                { key: 'gender', label: 'Gender' },
                { key: 'chief_complaint', label: 'Chief Complaint' },
                { key: 'duration', label: 'Duration' },
                { key: 'allergies', label: 'Allergies' },
                { key: 'medications', label: 'Medications' },
                { key: 'referred_by', label: 'Referred By' },
            ];
            
            dataGrid.innerHTML = fields.map(f => {
                const value = extracted[f.key] || '';
                const isMissing = !value || value === 'unreadable' || value === 'N/A' || value === 'none';
                const displayValue = isMissing ? '—' : value;
                const statusClass = isMissing ? 'missing' : 'extracted';
                const dotClass = isMissing ? 'miss' : 'ok';
                return `
                    <div class="data-cell">
                        <div class="data-label">
                            <span class="field-status ${dotClass}"></span>${f.label}
                        </div>
                        <div class="data-value ${statusClass}">${displayValue}</div>
                    </div>
                `;
            }).join('');
            
            // Scroll to results
            resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function updateFilterCounts() {
            const counts = { all: MOCK_PATIENTS.length, red: 0, yellow: 0, green: 0 };
            MOCK_PATIENTS.forEach(p => { if (counts[p.priority] !== undefined) counts[p.priority]++; });
            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('countRed').textContent = counts.red;
            document.getElementById('countYellow').textContent = counts.yellow;
            document.getElementById('countGreen').textContent = counts.green;
        }

        function renderPatientList() {
            const filtered = currentFilter === 'all' 
                ? MOCK_PATIENTS 
                : MOCK_PATIENTS.filter(p => p.priority === currentFilter);
            
            queueCount.textContent = `${filtered.length} patient${filtered.length !== 1 ? 's' : ''}`;
            
            if (filtered.length === 0) {
                patientList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
                            </svg>
                        </div>
                        <p>No patients in this category</p>
                    </div>
                `;
                return;
            }
            
            patientList.innerHTML = filtered.map((p, i) => {
                const displayName = (!p.patient_name || p.patient_name === 'unreadable') 
                    ? `<span style="color: var(--text-muted); font-style: italic;">Unknown Patient</span>` 
                    : p.patient_name;
                const newBadge = p.isNew 
                    ? `<span class="new-badge">New</span>` 
                    : '';
                const newClass = p.isNew ? 'is-new' : '';
                return `
                <div class="patient-item ${p.priority} animate-in ${newClass}" data-id="${p.id}" style="animation-delay: ${i * 0.05}s">
                    <div class="patient-priority ${p.priority}">${p.priority.charAt(0).toUpperCase()}</div>
                    <div class="patient-info">
                        <div class="patient-name">${displayName}${newBadge}</div>
                        <div class="patient-details">${p.age || '?'}y · ${p.chief_complaint || '—'}</div>
                    </div>
                    <div class="patient-time">${formatTime(p.created_at)}</div>
                </div>
            `}).join('');
        }

        function openModal(patient) {
            const fields = [
                { key: 'patient_name', label: 'Patient Name' },
                { key: 'age', label: 'Age' },
                { key: 'gender', label: 'Gender' },
                { key: 'chief_complaint', label: 'Chief Complaint' },
                { key: 'duration', label: 'Duration' },
                { key: 'allergies', label: 'Allergies' },
                { key: 'medications', label: 'Medications' },
                { key: 'referred_by', label: 'Referred By' },
            ];

            const dataGridHtml = fields.map(f => {
                const value = patient[f.key] || '';
                const isMissing = !value || value === 'unreadable' || value === 'N/A' || value === 'none';
                const displayValue = isMissing ? '—' : value;
                const statusClass = isMissing ? 'missing' : 'extracted';
                const dotClass = isMissing ? 'miss' : 'ok';
                return `
                    <div class="data-cell">
                        <div class="data-label">
                            <span class="field-status ${dotClass}"></span>${f.label}
                        </div>
                        <div class="data-value ${statusClass}">${displayValue}</div>
                    </div>
                `;
            }).join('');

            const descriptions = patient.matched_descriptions && patient.matched_descriptions.length > 0
                ? patient.matched_descriptions
                : (patient.matched_rules && patient.matched_rules.length > 0 ? patient.matched_rules : []);
            const rulesHtml = descriptions.length > 0
                ? `<div class="rules-list">${descriptions.map(r => `<span class="rule-tag">${r}</span>`).join('')}</div>`
                : '<p style="color: var(--text-muted); font-size: 13px;">No specific rules matched</p>';

            const escalationHtml = patient.escalated
                ? `<div class="modal-section">
                    <div class="modal-section-title">Escalation</div>
                    <div class="escalation-box">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                        </svg>
                        <span class="escalation-text">${patient.escalation_reason || 'Escalated due to risk factors'}</span>
                    </div>
                </div>`
                : '';

            const modalName = (!patient.patient_name || patient.patient_name === 'unreadable')
                ? 'Unknown Patient'
                : patient.patient_name;
            modalTitle.textContent = modalName;

            modalBody.innerHTML = `
                <div class="triage-banner ${patient.priority}" style="margin: -24px -24px 24px -24px; border-radius: 0;">
                    <div class="triage-indicator ${patient.priority}">${patient.priority.toUpperCase()}</div>
                    <div class="triage-info">
                        <h3>${patient.priority_label}</h3>
                        <p>${patient.action}</p>
                    </div>
                    <div class="triage-meta">
                        <div class="triage-wait">${patient.wait_time}</div>
                        <div class="triage-wait-label">Wait Time</div>
                    </div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title">Extracted Data</div>
                    <div class="data-grid">${dataGridHtml}</div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title">Matched Rules</div>
                    ${rulesHtml}
                </div>
                ${escalationHtml}
                <div class="modal-section">
                    <div class="modal-section-title">Metadata</div>
                    <div class="data-grid" style="grid-template-columns: 1fr 1fr;">
                        <div class="data-cell">
                            <div class="data-label">Patient ID</div>
                            <div class="data-value">#${patient.id}</div>
                        </div>
                        <div class="data-cell">
                            <div class="data-label">Admitted</div>
                            <div class="data-value">${patient.created_at}</div>
                        </div>
                    </div>
                </div>
            `;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function printTriageCard() {
            window.print();
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp.replace(' ', 'T'));
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        function showToast(message, type = '') {
            toast.textContent = message;
            toast.className = `toast ${type}`;
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Start
        init();
    </script>
</body>
</html>
